<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Squish Pop</title>
  <meta name="theme-color" content="#FFB6D9">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Menu Screen -->
  <div id="screen-menu" class="screen active">
    <div class="menu-deco" aria-hidden="true">
      <div class="menu-balloon menu-balloon-1"></div>
      <div class="menu-balloon menu-balloon-2"></div>
      <div class="menu-balloon menu-balloon-3"></div>
    </div>
    <button class="btn-settings-cog" id="btn-settings" aria-label="Settings">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
    </button>
    <div class="menu-logo">🎈</div>
    <h1 class="title">Squish Pop</h1>
    <p class="subtitle">Tap the balloons!</p>
    <div id="menu-stats" class="menu-stats"></div>
    <div class="menu-buttons">
      <button class="btn btn-primary" id="btn-endless">Endless Pop</button>
      <button class="btn btn-secondary" id="btn-hunt">Blind Box Hunt</button>
      <button class="btn btn-ghost" id="btn-album">My Collection</button>
    </div>
    <div class="menu-footer">Made with ❤️ for Amelia</div>
  </div>

  <!-- Game Screen -->
  <div id="screen-game" class="screen">
    <div class="game-hud">
      <button class="btn-back" id="btn-back-game">←</button>
      <div class="score-display">
        <span id="score">0</span>
        <span class="score-label">pops</span>
      </div>
      <div class="hud-mode" id="hud-mode"></div>
    </div>
    <div class="combo-display" id="combo-display"></div>
    <div id="game-area"></div>
    <div id="mascot">🐾</div>

    <!-- Blind Box Reveal Modal -->
    <div id="collect-reveal" class="modal-overlay hidden">
      <div class="modal-card">
        <div class="modal-sparkles">✨✨✨</div>
        <div id="collect-new" class="collect-new-badge" style="display:none">NEW!</div>
        <div id="collect-emoji" class="collect-emoji">🐱</div>
        <div id="collect-name" class="collect-name">Galaxy Kitten</div>
        <div id="collect-rarity" class="collect-rarity">Ultra Rare!</div>
        <button class="btn btn-primary" id="btn-collect-ok">Yay! Add to Album</button>
      </div>
    </div>

    <!-- Round End Modal (Hunt mode) -->
    <div id="round-end" class="modal-overlay hidden">
      <div class="modal-card">
        <div style="font-size:3rem">🎉</div>
        <h2>Round over!</h2>
        <p id="round-score-text"></p>
        <button class="btn btn-primary" id="btn-play-again">Play Again</button>
        <button class="btn btn-ghost" id="btn-to-menu">Menu</button>
      </div>
    </div>
  </div>

  <!-- Album Screen -->
  <div id="screen-album" class="screen screen-scroll">
    <div class="screen-header">
      <button class="btn-back" id="btn-back-album">←</button>
      <h2>My Collection</h2>
    </div>
    <div id="album-progress" class="album-progress"></div>
    <div id="album-grid" class="album-grid"></div>
  </div>

  <!-- Settings Screen -->
  <div id="screen-settings" class="screen screen-scroll">
    <div class="screen-header">
      <button class="btn-back" id="btn-back-settings">←</button>
      <h2>Settings</h2>
    </div>
    <div class="settings-list">
      <label class="setting-row">
        <span>Sound effects</span>
        <input type="checkbox" id="toggle-sound" checked>
      </label>
      <div class="setting-row">
        <span>Difficulty</span>
        <select id="select-difficulty">
          <option value="easy">Easy 🌸</option>
          <option value="normal" selected>Normal ✨</option>
          <option value="hard">Hard 🔥</option>
        </select>
      </div>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/collectibles.js"></script>
  <script src="js/game.js"></script>
  <script src="js/album.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
